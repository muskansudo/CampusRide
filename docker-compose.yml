services:
  postgres:
    image: postgres:16-alpine
    container_name: campus_ride_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: campus_ride
      POSTGRES_PASSWORD: campus_ride_secret
      POSTGRES_DB: campus_ride_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
